# Video Organizer configuration.
# Copy this file to config.yaml (gitignored) and edit source_folder for your machine.

# Root folder to scan recursively for videos.
source_folder: "C:/Users/you/Videos"

# Video file extensions to consider (case-insensitive).
video_extensions:
  - .mp4
  - .mkv
  - .avi
  - .mov
  - .wmv
  - .flv
  - .webm
  - .m4v

# --- Duplicate / probable-duplicate detection ---
duplicates:
  enabled: true
  # Folder created inside source_folder to hold groups of (probable) duplicates for manual review.
  review_folder_name: "_duplicates_review"
  # Perceptual-hash Hamming distance below which two frames are considered "the same shot".
  hash_distance_threshold: 8
  # Two videos are only compared for similarity if their durations differ by less than this.
  duration_tolerance_seconds: 2

# --- Short-video detection ---
short_videos:
  enabled: true
  # Folder created inside source_folder to hold clips shorter than max_duration_seconds.
  review_folder_name: "_short_videos"
  max_duration_seconds: 5

# Ask for confirmation before moving files. Override per-run with --yes / --dry-run.
confirm_before_move: true
