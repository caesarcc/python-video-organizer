# Configuração do Video Organizer.
# Copie este arquivo para config.yaml (ignorado pelo git) e edite o source_folder para sua máquina.

# Pasta raiz onde os vídeos serão buscados recursivamente.
# Opcional: se este campo for omitido, a pasta atual (de onde o comando for executado) é usada.
# De qualquer forma, antes de começar a varredura o programa sempre mostra a pasta que será
# usada e pede uma confirmação explícita no terminal - inclusive quando --yes ou --dry-run
# forem passados.
source_folder: "C:/Users/you/Videos"

# Extensões de arquivo consideradas vídeo (não diferencia maiúsculas/minúsculas).
video_extensions:
  - .mp4
  - .mkv
  - .avi
  - .mov
  - .wmv
  - .flv
  - .webm
  - .m4v

# --- Detecção de duplicados / prováveis duplicados ---
duplicates:
  enabled: true
  # Pasta criada dentro de source_folder para guardar grupos de (prováveis) duplicados para revisão manual.
  review_folder_name: "_duplicates_review"
  # Distância de Hamming do hash perceptual abaixo da qual dois frames são considerados "a mesma cena".
  hash_distance_threshold: 8
  # Dois vídeos só são comparados por similaridade se a diferença de duração for menor que isso.
  duration_tolerance_seconds: 2

# --- Detecção de vídeos curtos ---
short_videos:
  enabled: true
  # Pasta criada dentro de source_folder para guardar clipes mais curtos que max_duration_seconds.
  review_folder_name: "_short_videos"
  max_duration_seconds: 5

# Pede confirmação antes de mover arquivos. Pode ser sobrescrito por execução com --yes / --dry-run.
confirm_before_move: true
